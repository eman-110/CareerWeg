<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skill Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    <iframe id="header-frame" src="../../header-main.html"></iframe>
  <div class="container">
    <header>
      <h1>Skill Test</h1>
      <p class="subtitle">Test real skills, hire with confidence</p>
    </header>

    <section class="card">
      <h2>Java Developer</h2>
      <p class="description">
        Write a Java program that reads a list of integers and returns the second largest unique number in the list.<br/>
        If there is no second largest (i.e., all numbers are the same), return -1.<br/>
        <strong>Input:</strong> [4, 1, 3, 4, 5, 2]<br/>
        <strong>Output:</strong> 4
      </p>

      <form class="answer-form">
        <textarea placeholder="Answer" required></textarea>
        <button type="submit">Submit</button>
      </form>
    </section>
  </div>
  <iframe id="footer-frame" src="../../footer-main.html"></iframe>
</body>
</html>
